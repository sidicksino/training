<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple E-Commerce Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Shop</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>


    <!-- Hero Section -->
    <section class="hero">

        <h2>Welcome to My Online Store</h2>

        <p>
            Find quality products at affordable prices.
        </p>

        <button>Shop Now</button>

    </section>


    <!-- Products Section -->
    <section class="products">

        <h2>Our Products</h2>

        <div class="product-container">

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">

                <h3>Running Shoes</h3>

                <p>$40</p>

                <button>Buy Now</button>
            </div>


            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">

                <h3>Smart Watch</h3>

                <p>$55</p>

                <button>Buy Now</button>
            </div>


            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product">

                <h3>Backpack</h3>

                <p>$25</p>

                <button>Buy Now</button>
            </div>

        </div>

    </section>


    <!-- Footer -->
    <footer>

        <p>
            &copy; 2026 My Shop. All rights reserved.
        </p>

    </footer>

</body>
</html>

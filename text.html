<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Text Formatting</title>

    <style>
        h1{
            color: #2c3e50;
            border-bottom: 2px solid #ccc;
            padding-bottom: 5px;
        }

        h2{
            font-size: 22px;
            font-weight: normal;
        }

        ul, ol{
            padding-left: 25px;
        }

        mark{
            background: yellow;
        }

        code{
            background: #eee;
            padding: 2px 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h2>I <b>like</b> coding</h2>
    <h2>I <i>like</i> coding</h2>
    <h2>I <u>like</u> coding</h2>
    <h2>I <s>like</s> coding</h2>
    <h2>I <mark>like</mark> coding</h2>
    <h2>I <big>like</big> coding</h2>
    <h2>I <small>like</small> coding</h2>
    <h2>I <sub>like</sub> coding</h2>
    <h2>I <sup>like</sup> coding</h2>
    <h2>I <code>like</code> coding</h2>

    <br>

    <h1>Unordered List</h1>

    <ul>
        <li>Mango</li>
        <li>Apple</li>
        <li>Orange</li>
    </ul>

    <h1>Ordered List</h1>

    <ol>
        <li>Mango</li>
        <li>Apple</li>
        <li>Orange</li>
    </ol>

</body>
</html>
